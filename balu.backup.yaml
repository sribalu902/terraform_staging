services:

  redis-bpp:
    image: redis:7-alpine
    container_name: redis-bpp
    ports:
      - "6379"
    networks:
      - onix-bpp-kafka
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    volumes:
      - redis_data:/data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-bpp
    ports:
      - "9092"
      - "9093"
    environment:
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_NODE_ID=1
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-bpp:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-bpp:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-bpp-data:/var/lib/kafka/data
    networks:
      - onix-bpp-kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  onix-bpp-kafka-plugin:
#    image: manendrapalsingh/onix-adapter:latest
    image: 488514412303.dkr.ecr.ap-south-1.amazonaws.com/onix:latest
    pull_policy: always
    container_name: onix-bpp-plugin-kafka
    ports:
      - "8002:8002"
    volumes:
      - ./config/onix-bpp:/app/config/message-baised/kafka/onix-bpp
      - ./schema:/app/schemas:ro
    environment:
      CONFIG_FILE: /app/config/message-baised/kafka/onix-bpp/adapter.yaml
    depends_on:
      redis-bpp:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - onix-bpp-kafka
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui-bpp
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: bpp
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka.internal:9092
    networks:
      - onix-bpp-kafka
    restart: unless-stopped

  postgres:
    image: 'postgis/postgis:17-3.6-alpine'
    environment:
      POSTGRES_USER: 'cdsuser'
      POSTGRES_PASSWORD: 'cdspwd'
      POSTGRES_DB: 'cds_db'
    ports:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cdsuser -d cds_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - onix-bpp-kafka

  cds-app:
    ## Build the image first cmd: docker compose -f compose-dev.yml build
#    image: cds-app:v0
    image: 488514412303.dkr.ecr.ap-south-1.amazonaws.com/cds:latest
    pull_policy: always
    container_name: cds
    environment:
      JAVA_OPTS: >-
        -XX:+ExitOnOutOfMemoryError
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/var/dump
        -XX:+UseStringDeduplication
        --enable-native-access=ALL-UNNAMED
      APP_ARGS: >-
        --spring.threads.virtual.enabled=true
        --spring.profiles.active=kafka,postgres,redis,dev

        --spring.kafka.consumer.bootstrap-servers=
        --spring.kafka.producer.bootstrap-servers=kafka.internal:9092
        --kafka.catalogue.on-publish-event.topic=kafka.internal:9092
        --kafka.catalogue.publish-event.topics=bpp.catalog_publish
        --kafka.catalogue.publish-event.groupId=bpp.catalog_publish_group
        --kafka.catalogue.discover-event.topics=bpp.discover
        --kafka.catalogue.discover-event.groupId=bpp.discover_group
        --kafka.catalogue.discover-publish-event.topic=bpp.discover_publish
        --kafka.catalogue.on-discover-event.topic=bpp.on_discover
        --kafka.catalogue.on-discover-event.topics=bpp.on_discover_publish
        --kafka.catalogue.on-discover-event.groupId=bpp.on_discover_publish_group

        --spring.datasource.url=jdbc:postgresql:cds-postgres-0.cdgq6yy2sxsm.ap-south-1.rds.amazonaws.com:5432/cds_db
        --spring.datasource.username=cds_admin
        --spring.datasource.password=DBpossword123

        --spring.data.redis.url=redis://clustercfg.uatredis.fgvf7e.aps1.cache.amazonaws.com:6379
        --spring.data.redis.password=
    ports:
      - "8080:8080"
    networks:
      - onix-bpp-kafka
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 8080 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis-bpp:
        condition: service_healthy
    deploy:
      mode: replicated
      replicas: 1
  #    volumes:
  #      # Mount host directory to container to store heap dumps
  #      - /<path-to>/dumps:/var/dump

volumes:
  kafka-bpp-data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  onix-bpp-kafka:
    driver: bridge